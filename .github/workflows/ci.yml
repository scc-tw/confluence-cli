name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.94.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          components: rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libdbus-1-dev libsecret-1-dev

      - name: Format check
        run: cargo fmt --check

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked --bin confluence

      - name: Package crate metadata check
        run: cargo package --locked

  build-matrix:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
          - name: linux-x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: macos-x64
            runner: macos-13
            target: x86_64-apple-darwin
          - name: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.94.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          target: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libdbus-1-dev libsecret-1-dev

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} --bin confluence
