name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate-release:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag and Cargo.toml version
        id: version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(python - <<'PY'
          from pathlib import Path
          for line in Path('Cargo.toml').read_text().splitlines():
              if line.startswith('version = '):
                  print(line.split('=', 1)[1].strip().strip('"'))
                  break
          PY
          )
          if [ -z "$CARGO_VERSION" ]; then
            echo "Failed to read package version from Cargo.toml" >&2
            exit 1
          fi
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "Tag version v$TAG_VERSION does not match Cargo.toml version $CARGO_VERSION" >&2
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

  build-release:
    name: Build release (${{ matrix.name }})
    needs: validate-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: confluence.exe
            asset_ext: .exe
          - name: linux-x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: confluence
            asset_ext: ''
          - name: macos-x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            binary_name: confluence
            asset_ext: ''
          - name: macos-arm64
            runner: macos-15
            target: aarch64-apple-darwin
            binary_name: confluence
            asset_ext: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.94.0
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.94.0
          target: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libdbus-1-dev libsecret-1-dev

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }} --bin confluence

      - name: Prepare release asset
        id: asset
        shell: pwsh
        run: |
          $asset = "confluence-${{ needs.validate-release.outputs.version }}-${{ matrix.target }}${{ matrix.asset_ext }}"
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" $asset
          $hash = (Get-FileHash $asset -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "$asset.sha256" -NoNewline -Value "$hash  $asset"
          "path=$asset" >> $env:GITHUB_OUTPUT
          "checksum=$asset.sha256" >> $env:GITHUB_OUTPUT

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: |
            ${{ steps.asset.outputs.path }}
            ${{ steps.asset.outputs.checksum }}

  publish-release:
    name: Publish GitHub Release
    needs:
      - validate-release
      - build-release
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: release-*
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*
